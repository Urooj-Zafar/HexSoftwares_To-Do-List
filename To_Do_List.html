<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="To_Do_List.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="input-container">
            <h1>Mind Space</h1>
            <input type="text" placeholder="Add your task" id="inputBox">
            <input type="button" value="Add" id="addBtn">
        </div>
        <ul class="list" id="toDoList">
            <!-- <li>Task 1</li> -->
        </ul>
        <div class="stats">
        <p>Total: <span id="totalTasks">0</span></p>
        <p>Done: <span id="doneTasks">0</span></p>
         </div>
    </div>
    <script src="To_Do_List.js"></script>
</body>
</html>
